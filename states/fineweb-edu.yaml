# fineweb-edu.yaml
#
# Enables the ingest worker with the fineweb-edu dataset. When this
# fragment is loaded, `terraform apply` adds an `ingest` container to
# the generated docker-compose alongside `cog`. The container pulls
# fineweb-edu in streaming mode, splits documents into fragments, and
# feeds them into the atomspace via scheme-over-telnet.
#
# Rate-limited on purpose. Five fragments/second and a 1000-fragment
# cap is deliberately gentle for a first run. Raise both once you
# have observed the system behaving well.

services:
  ingest:
    core:
      dataset:
        source: HuggingFaceFW/fineweb-edu
        config: sample-10BT       # smallest sampled fineweb-edu config
        split: train

      fragments:
        min_words: 3              # drop tails smaller than this
        max_words: 8              # contiguous windows of this many words

      rate:
        fragments_per_second: 5   # trickle; raise when comfortable
        max_fragments: 1000       # 0 for unbounded; stop after this many

      # Future extension: tag every ingested fragment with a role
      # ConceptAtom. Not used by the current trivial inference; adding
      # it now would cost telnet round-trips for no benefit.
      #
      # role_tag: assistant       # mirrors praxis's conversation-wrapper
